<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Purchases</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <h1>Gas Purchases</h1>
    <div class="content">
        <div class="input-group">
            <label for="usPrice">US Price per Gallon ($)</label>
            <input type="number" id="usPrice" step="0.001" inputmode="decimal" placeholder="0.000" autofocus />
        </div>

        <div class="input-group">
            <label for="cdnPrice">Canada Price per Litre ($)</label>
            <input type="number" id="cdnPrice" step="0.001" inputmode="decimal" placeholder="0.000" />
        </div>

        <div class="input-group">
            <label for="exchangeRate">Exchange Rate (1 USD = X CAD)</label>
            <input type="number" id="exchangeRate" step="0.0001" inputmode="decimal" placeholder="1.0000" required />
        </div>

        <button onclick="calculate()">Calculate</button>

        <button onclick="clearForm()">Clear</button>
    </div>
</body>

</html>
